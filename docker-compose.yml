version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - COMPOSER_PROCESS_TIMEOUT=2000
    container_name: loyalty-app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    networks:
      - loyalty_network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: loyalty-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-loyalty_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - loyalty_network
    command: --default-authentication-plugin=mysql_native_password

  webserver:
    image: nginx:alpine
    container_name: loyalty-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - loyalty_network
    depends_on:
      - app

volumes:
  db_data:

networks:
  loyalty_network:
    driver: bridge
